name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Get your code
        uses: actions/checkout@v4

      - name: 2. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Set up Android Tools (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Force Heal Corrupted Assets (FIX MIME ERROR)
        run: |
          mkdir -p assets
          # Force delete existing assets because the uploaded files are corrupt (MIME <null> error)
          rm -f assets/*.png
          # Download guaranteed correct files
          curl -sL https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/icon.png -o assets/icon.png
          curl -sL https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/adaptive-icon.png -o assets/adaptive-icon.png
          curl -sL https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/splash.png -o assets/splash.png
          curl -sL https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/favicon.png -o assets/favicon.png
          echo "Corrupted assets replaced with valid placeholders."

      - name: 5. Install App Libraries
        run: npm install --legacy-peer-deps

      - name: 6. Prepare Mobile Folders
        run: npx expo prebuild --platform android --no-install

      - name: 7. Build the Standalone APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 8. Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Faculty-Club-APK
          path: android/app/build/outputs/apk/release/*.apk

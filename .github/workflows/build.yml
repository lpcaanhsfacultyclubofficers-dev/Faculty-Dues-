   name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Fix for the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Get your code
        uses: actions/checkout@v4

      - name: 2. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to Node 22 for stability
          cache: 'npm'

      - name: 3. Set up Android Tools (Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Install App Libraries
        run: npm install --legacy-peer-deps

      - name: 5. Prepare Mobile Folders
        run: npx expo prebuild --platform android --no-install

      - name: 6. Build the Standalone APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 7. Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Faculty-Club-APK
          path: android/app/build/outputs/apk/release/*.apk
